version: '3.8'

services:
  # vLLM cho mô hình Qwen 2.5 72B (Proposer)
  # Lab 1 GPU: chỉ chạy 1 model để giảm tài nguyên so với docker-compose đầy đủ.
  vllm-qwen25:
    image: vllm/vllm-openai:latest
    container_name: vllm-qwen25
    ports:
      - "8000:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: [
      "--model", "Qwen/Qwen2.5-72B-Instruct",
      "--host", "0.0.0.0",
      "--port", "8000",
      "--gpu-memory-utilization", "0.90",
      "--dtype", "bfloat16",
      "--max-model-len", "8192",
      "--tensor-parallel-size", "1"
    ]

  # Redis dùng cho caching / rate limiting
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Elasticsearch + Kibana (tuỳ chọn) cho log AIOps cơ bản
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

volumes:
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local
